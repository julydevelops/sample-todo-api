name: Build and Upload Lambda Package

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Clean previous build artifacts
        run: rm -rf build function.zip

      - name: Install dependencies into build/ dir
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -t build

      - name: Copy application code into build/
        run: |
          mkdir -p build
          cp -r src/* build/ 2>/dev/null || true
          cp *.py build/ 2>/dev/null || true

      - name: Zip up function.zip
        run: |
          cd build
          zip -r9 ../function.zip .

      - name: Upload Lambda package artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-package
          path: function.zip

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload Lambda package to S3
        run: |
          aws s3 cp function.zip s3://${{ secrets.S3_BUCKET_NAME }}/${{ github.event.repository.name }}/function.zip
